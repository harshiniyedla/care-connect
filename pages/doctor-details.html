<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Details - CareConnect</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            display: flex;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            gap: 30px;
            margin-top: 20px;
        }

        .profile-img img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #ccc;
        }

        .profile-info {
            flex: 1;
        }

        .profile-info h2 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .profile-info .tag {
            background-color: var(--secondary-color);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .slots-preview {
            margin-top: 20px;
        }

        .slot-badge {
            display: inline-block;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 5px 10px;
            border-radius: 15px;
            margin-right: 5px;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .profile-container {
                flex-direction: column;
                text-align: center;
            }

            .profile-img img {
                width: 100%;
                max-width: 300px;
                height: 300px;
            }

            .info-grid {
                grid-template-columns: 1fr;
                text-align: left;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" class="logo">CareConnect</a>
        <button class="mobile-menu-btn">☰</button>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/pages/doctors.html">Doctors</a></li>
            <li><a href="/pages/appointments.html">My Appointments</a></li>
        </ul>
    </nav>

    <div class="container">
        <a href="doctors.html" class="btn" style="background-color: #666;">&larr; Back to Doctors</a>

        <div id="doctorProfile" class="profile-container">
            <!-- Details injected by JS -->
        </div>
    </div>
    <script src="/script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');
        const doctor = getDoctorById(docId);
        const container = document.getElementById('doctorProfile');

        if (doctor) {
            container.innerHTML = `
                <div class="profile-img">
                    <img src="/${doctor.image}" alt="${doctor.name}" onerror="this.src='https://images.unsplash.com/photo-1559839734-2b71f1e598c6?w=400'">
                </div>
                <div class="profile-info">
                    <h2>${doctor.name}</h2>
                    <span class="tag">${doctor.specialization}</span>
                    <p style="margin-top: 10px; color: #666; font-style: italic;">${doctor.hospital || 'CareConnect Partner Hospital'}</p>
                    <p style="margin-top: 10px;">${doctor.about}</p>
                    
                    <div class="info-grid">
                        <p><strong>Experience:</strong> ${doctor.experience}</p>
                        <p><strong>Consultation Fee:</strong> ₹${doctor.fee}</p>
                        <p><strong>Rating:</strong> ★ ${doctor.rating} / 5</p>
                    </div>

                    <div class="slots-preview">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h4 style="margin: 0;">Check Availability:</h4>
                            <input type="date" id="profileDate" style="padding: 5px; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;">
                        </div>
                        <div id="dynamicSlots" style="margin-top:5px; min-height: 40px;">
                            <!-- Slots injected by JS -->
                            <p style="color: #999; font-size: 0.9rem;">Select a date to see available slots.</p>
                        </div>
                    </div>

                    <br>
                    <a id="bookBtn" href="booking.html?id=${doctor.id}" class="btn" style="padding: 15px 30px; font-size: 1.1rem; width: 100%; text-align: center; display: block;">Book Appointment</a>
                </div>
            `;

            // Logic for dynamic slots on profile page
            const dateInput = document.getElementById('profileDate');
            const slotsDiv = document.getElementById('dynamicSlots');
            const bookBtn = document.getElementById('bookBtn');

            // Set default to today
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
            dateInput.min = today;

            dateInput.onchange = fetchProfileSlots;
            fetchProfileSlots(); // Initial load

            async function fetchProfileSlots() {
                const date = dateInput.value;
                if (!date) return;

                slotsDiv.innerHTML = '<p style="color: #666; font-size: 0.9rem;">Loading slots...</p>';
                bookBtn.href = `booking.html?id=${doctor.id}&date=${date}`;

                try {
                    const response = await fetch(`${API_URL}/api/availability/${doctor.id}?date=${date}`);
                    const data = await response.json();

                    if (data.success) {
                        if (data.slots.length === 0) {
                            slotsDiv.innerHTML = '<p style="color: #e67e22; font-size: 0.9rem; font-weight: 500;">No slots added for this date.</p>';
                        } else {
                            slotsDiv.innerHTML = '';
                            data.slots.forEach(slot => {
                                const isBooked = slot.status === 'booked';
                                const span = document.createElement('span');
                                span.className = 'slot-badge';
                                if (isBooked) {
                                    span.style.borderColor = '#ccc';
                                    span.style.color = '#999';
                                    span.style.backgroundColor = '#f5f5f5';
                                    span.textContent = `${slot.time_slot} (Booked)`;
                                } else {
                                    span.textContent = slot.time_slot;
                                }
                                slotsDiv.appendChild(span);
                            });
                        }
                    }
                } catch (err) {
                    console.error("Error fetching profile slots:", err);
                    slotsDiv.innerHTML = '<p style="color: red; font-size: 0.9rem;">Failed to load slots.</p>';
                }
            }
        } else {
            console.error("Doctor ID not found:", docId);
            container.innerHTML = `<div class="alert alert-warning">Doctor not found. Please <a href="doctors.html">go back</a> and try again.</div>`;
        }
    </script>
</body>

</html>
