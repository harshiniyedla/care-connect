<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - CareConnect</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }

        .summary-card {
            background-color: var(--secondary-color);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" class="logo">CareConnect</a>
        <button class="mobile-menu-btn">☰</button>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/pages/doctors.html">Doctors</a></li>
            <li><a href="/pages/appointments.html">My Appointments</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="text-center mt-20 mb-20">Confirm Your Booking</h2>

        <div class="form-container">
            <div id="docSummary" class="summary-card">
                <!-- Doctor summary -->
            </div>

            <form id="bookingForm">
                <div class="form-group">
                    <label for="pName">Patient Name</label>
                    <input type="text" id="pName" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="pPhone">Phone Number</label>
                    <input type="tel" id="pPhone" required placeholder="Enter phone number">
                </div>
                <div class="form-group">
                    <label for="pDate">Date</label>
                    <input type="date" id="pDate" required>
                </div>
                <div class="form-group">
                    <label for="pSlot">Select Slot</label>
                    <select id="pSlot" required>
                        <option value="">Choose a time...</option>
                    </select>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Proceed to Payment</button>
            </form>
        </div>
    </div>

    <script src="/script.js"></script>
    <script>
        try {
            requireAuth('patient');
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('id');
            console.log("Booking page loading for Doctor ID:", docId);

            let doctor = getDoctorById(docId);
            window.doctor = doctor; // Make it globally accessible
            const summaryDiv = document.getElementById('docSummary');
            const slotSelect = document.getElementById('pSlot');

            if (doctor) {
                console.log("Doctor found:", doctor.name);
                summaryDiv.innerHTML = `
                    <h3>Booking with ${doctor.name}</h3>
                    <p><strong>${doctor.specialization}</strong></p>
                    <p>${doctor.hospital || 'CareConnect Partner Hospital'}</p>
                    <p>Consultation Fee: ₹${doctor.fee}</p>
                `;

                // =====================================================
                //  ADDED: Dynamic Slot Fetching
                // =====================================================
                const pDateInput = document.getElementById('pDate');

                // Set default date logic
                const today = new Date().toISOString().split('T')[0];
                const urlDate = urlParams.get('date');

                pDateInput.min = today;
                pDateInput.value = urlDate || today;

                pDateInput.onchange = updateSlots;
                updateSlots(); // Initial load

                async function updateSlots() {
                    const date = pDateInput.value;
                    if (!date) return;

                    slotSelect.innerHTML = '<option value="">Loading slots...</option>';

                    try {
                        const response = await fetch(`${API_URL}/api/availability/${docId}?date=${date}`);
                        const data = await response.json();

                        if (data.success) {
                            slotSelect.innerHTML = '<option value="">Choose a time...</option>';
                            if (data.slots.length === 0) {
                                const opt = document.createElement('option');
                                opt.value = "";
                                opt.textContent = "No slots available for this date";
                                opt.disabled = true;
                                slotSelect.appendChild(opt);
                            } else {
                                data.slots.forEach(slot => {
                                    const opt = document.createElement('option');
                                    opt.value = slot.time_slot;
                                    const isBooked = slot.status === 'booked';
                                    opt.textContent = isBooked ? `${slot.time_slot} (Booked)` : slot.time_slot;
                                    if (isBooked) opt.disabled = true;
                                    slotSelect.appendChild(opt);
                                });
                            }
                        }
                    } catch (err) {
                        console.error("Error fetching slots:", err);
                        slotSelect.innerHTML = '<option value="">Server connection error</option>';
                    }
                }
            } else {
                console.error("Critical: Doctor ID not found in database.");
                summaryDiv.innerHTML = `<div style="color:red">Error: Doctor information could not be retrieved.</div>`;
            }
        } catch (err) {
            console.error("Script Error in booking.html:", err);
            alert("Application Error: Please refresh and try again.");
        }

        // Handle Form Submit
        if (document.getElementById('bookingForm')) {
            document.getElementById('bookingForm').addEventListener('submit', function (e) {
                e.preventDefault();
                const pSlot = document.getElementById('pSlot').value;
                if (!pSlot) {
                    alert("Please select a time slot.");
                    return;
                }
                const booking = {
                    id: Date.now(),
                    doctorId: doctor?.id, // ADDED: Required for slot booking
                    doctorName: doctor?.name || "Doctor",
                    doctorSpec: doctor?.specialization || "Specialist",
                    hospital: doctor?.hospital || "Hospital",
                    patientName: document.getElementById('pName').value,
                    date: document.getElementById('pDate').value,
                    time: pSlot,
                    fee: doctor?.fee || 0,
                    status: 'Paid'
                };
                localStorage.setItem('pendingBooking', JSON.stringify(booking));
                window.location.href = 'payment.html';
            });
        }

        // Set min date
        const dateInput = document.getElementById('pDate');
        if (dateInput) {
            const today = new Date().toISOString().split('T')[0];
            dateInput.setAttribute('min', today);
        }
    </script>
</body>

</html>
